<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピッチング対決 - ボットを抑えろ！</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(#0a1f3d, #1a3a6e);
            color: white;
            text-align: center;
            overflow: hidden;
        }
        header {
            background: rgba(0,0,0,0.7);
            padding: 10px;
            font-size: 24px;
            font-weight: bold;
        }
        #game-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        canvas {
            border: 4px solid #ffd700;
            border-radius: 12px;
            background: #0a3d1f;
            box-shadow: 0 0 30px rgba(255,215,0,0.6);
        }
        .controls {
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 12px;
            width: 280px;
            text-align: left;
        }
        .pitcher-select {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .pitcher-btn {
            padding: 10px 15px;
            background: #333;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
            font-size: 14px;
        }
        .pitcher-btn.active {
            background: #ffd700;
            color: black;
            font-weight: bold;
        }
        .pitch-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1e90ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .pitch-btn:hover {
            background: #00bfff;
        }
        .pitch-btn.fast { background: #ff4444; }
        .pitch-btn.slow { background: #44aa44; }
        #info {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        #result {
            margin-top: 15px;
            font-size: 22px;
            min-height: 30px;
        }
        .stats {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>⚾ ピッチング対決 - ボットを抑えろ！</header>
    
    <div id="game-container">
        <canvas id="canvas" width="700" height="500"></canvas>
        
        <div class="controls">
            <h2>投手選択</h2>
            <div class="pitcher-select">
                <button class="pitcher-btn active" id="p1">投手1<br><small>パワータイプ</small></button>
                <button class="pitcher-btn" id="p2">投手2<br><small>変化球タイプ</small></button>
                <button class="pitcher-btn" id="p3">投手3<br><small>コントロール</small></button>
            </div>

            <h2>球種選択</h2>
            <button class="pitch-btn fast" id="pitch1">ストレート</button>
            <button class="pitch-btn" id="pitch2">変化球1</button>
            <button class="pitch-btn slow" id="pitch3">変化球2</button>

            <div id="info">
                カウント: <span id="count">0-0</span><br>
                ストライクアウトまで: <span id="outs">0/3</span>
            </div>

            <div id="result"></div>

            <div class="stats">
                <strong>スコア</strong><br>
                アウト: <span id="out-count">0</span>　<br>
                被安打: <span id="hit-count">0</span>　<br>
                三振: <span id="strikeout-count">0</span>
            </div>

            <button onclick="resetGame()" style="margin-top:15px; padding:10px 20px; font-size:16px;">
                新しい対戦
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 投手データ
        let pitchers = [
            {
                name: "投手1",
                pitches: [
                    { name: "ストレート", speed: 164, breakX: 0, breakY: 5, color: "#ff4444" },
                    { name: "イーファスピッチ", speed: 89, breakX: 8, breakY: 25, color: "#44ff44" },
                    { name: "チェンジアップ", speed: 120, breakX: 3, breakY: 18, color: "#ffaa00" }
                ]
            },
            {
                name: "投手2",
                pitches: [
                    { name: "スライダー", speed: 148, breakX: -25, breakY: 10, color: "#4488ff" },
                    { name: "カーブ", speed: 132, breakX: 22, breakY: 20, color: "#ff44ff" },
                    { name: "フォーシーム", speed: 158, breakX: 2, breakY: 8, color: "#ff4444" }
                ]
            },
            {
                name: "投手3",
                pitches: [
                    { name: "カッター", speed: 152, breakX: -12, breakY: 12, color: "#ffaa00" },
                    { name: "スプリッター", speed: 138, breakX: 5, breakY: 22, color: "#44ff88" },
                    { name: "シンカー", speed: 145, breakX: 18, breakY: 15, color: "#8888ff" }
                ]
            }
        ];

        let currentPitcher = 0;
        let currentPitchType = 0;
        let balls = 0, strikes = 0;
        let outs = 0;
        let hits = 0;
        let strikeouts = 0;
        let isThrowing = false;
        let pitchTrajectory = null;

        // ストライクゾーン
        const zone = { x: 320, y: 220, w: 120, h: 160 };

        function drawBackground() {
            // グラウンド
            ctx.fillStyle = "#0a3d1f";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 土
            ctx.fillStyle = "#8B4513";
            ctx.fillRect(0, 400, canvas.width, 100);
            
            // 投手板
            ctx.fillStyle = "#ddd";
            ctx.fillRect(180, 320, 80, 40);
            
            // ホームベース
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.moveTo(380, 420);
            ctx.lineTo(420, 420);
            ctx.lineTo(400, 460);
            ctx.closePath();
            ctx.fill();
            
            // ストライクゾーン
            ctx.strokeStyle = "#ffff00";
            ctx.lineWidth = 3;
            ctx.strokeRect(zone.x, zone.y, zone.w, zone.h);
            
            // バッター
            ctx.fillStyle = "#333";
            ctx.fillRect(390, 280, 60, 140); // 体
            ctx.fillStyle = "#f0d0b0";
            ctx.beginPath();
            ctx.arc(420, 260, 25, 0, Math.PI * 2);
            ctx.fill(); // 頭
        }

        function drawPitcher() {
            // 投手
            ctx.fillStyle = "#fff";
            ctx.fillRect(200, 250, 50, 100); // 体
            ctx.fillStyle = "#f0d0b0";
            ctx.beginPath();
            ctx.arc(225, 230, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBall(x, y) {
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function animatePitch() {
            if (!pitchTrajectory) return;
            
            let { x, y, vx, vy, progress } = pitchTrajectory;
            
            drawBackground();
            drawPitcher();
            
            x += vx;
            y += vy;
            progress += 0.018;
            
            // 変化球の動き
            const breakAmount = Math.sin(progress * Math.PI) * 0.8;
            x += pitchTrajectory.breakX * breakAmount * 0.6;
            y += pitchTrajectory.breakY * breakAmount * 0.4;
            
            drawBall(x, y);
            
            pitchTrajectory.x = x;
            pitchTrajectory.y = y;
            pitchTrajectory.progress = progress;
            
            // 到達判定
            if (y > 410) {
                isThrowing = false;
                resolvePitch(x);
                return;
            }
            
            requestAnimationFrame(animatePitch);
        }

        function throwPitch() {
            if (isThrowing) return;
            isThrowing = true;
            
            const pitch = pitchers[currentPitcher].pitches[currentPitchType];
            const speedFactor = (170 - pitch.speed) / 40; // 速いほど早い
            
            // 狙い目（ストライクゾーン中央付近に少しランダム）
            const targetX = zone.x + zone.w/2 + (Math.random() * 40 - 20);
            const targetY = zone.y + zone.h/2 + (Math.random() * 30 - 15);
            
            const startX = 240;
            const startY = 280;
            
            pitchTrajectory = {
                x: startX,
                y: startY,
                vx: (targetX - startX) * 0.035,
                vy: (targetY - startY) * 0.035,
                breakX: pitch.breakX,
                breakY: pitch.breakY,
                progress: 0
            };
            
            animatePitch();
        }

        function resolvePitch(ballX) {
            pitchTrajectory = null;
            
            const inStrikeZone = ballX > zone.x && ballX < zone.x + zone.w;
            
            // 打者の反応（速い球ほど見逃しやすいが、当たりにくい）
            const pitch = pitchers[currentPitcher].pitches[currentPitchType];
            const hitChance = inStrikeZone ? 
                Math.max(0.15, (180 - pitch.speed) / 90) : 0.08;
            
            if (Math.random() < hitChance) {
                // 安打
                document.getElementById('result').innerHTML = `<span style="color:#ff4444">⚾ 安打！</span>`;
                hits++;
                resetCount();
            } else {
                if (inStrikeZone) {
                    strikes++;
                    document.getElementById('result').innerHTML = `<span style="color:#ffdd44">ストライク！</span>`;
                } else {
                    balls++;
                    document.getElementById('result').innerHTML = `<span style="color:#44aaff">ボール</span>`;
                }
                
                updateCount();
                
                if (strikes >= 3) {
                    strikeouts++;
                    document.getElementById('result').innerHTML = `<span style="color:#44ff88">三振！</span>`;
                    outs++;
                    resetCount();
                }
                if (balls >= 4) {
                    document.getElementById('result').innerHTML = `<span style="color:#ffaa44">四球</span>`;
                    resetCount();
                }
            }
            
            updateStats();
            
            if (outs >= 3) {
                setTimeout(() => {
                    alert("ゲーム終了！\n三振: " + strikeouts + "　被安打: " + hits);
                    resetGame();
                }, 800);
            }
        }

        function updateCount() {
            document.getElementById('count').textContent = `${balls}-${strikes}`;
            document.getElementById('outs').textContent = `${outs}/3`;
        }

        function resetCount() {
            balls = 0;
            strikes = 0;
            updateCount();
        }

        function updateStats() {
            document.getElementById('out-count').textContent = outs;
            document.getElementById('hit-count').textContent = hits;
            document.getElementById('strikeout-count').textContent = strikeouts;
        }

        // イベントリスナー
        document.getElementById('p1').onclick = () => selectPitcher(0);
        document.getElementById('p2').onclick = () => selectPitcher(1);
        document.getElementById('p3').onclick = () => selectPitcher(2);

        function selectPitcher(n) {
            currentPitcher = n;
            document.querySelectorAll('.pitcher-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === n);
            });
            updatePitchButtons();
        }

        function updatePitchButtons() {
            const pitches = pitchers[currentPitcher].pitches;
            document.getElementById('pitch1').textContent = pitches[0].name;
            document.getElementById('pitch2').textContent = pitches[1].name;
            document.getElementById('pitch3').textContent = pitches[2].name;
        }

        document.getElementById('pitch1').onclick = () => { currentPitchType = 0; throwPitch(); };
        document.getElementById('pitch2').onclick = () => { currentPitchType = 1; throwPitch(); };
        document.getElementById('pitch3').onclick = () => { currentPitchType = 2; throwPitch(); };

        // マウスで狙いながら投げる（簡易）
        canvas.addEventListener('click', (e) => {
            if (isThrowing) return;
            throwPitch();
        });

        function resetGame() {
            balls = 0;
            strikes = 0;
            outs = 0;
            hits = 0;
            strikeouts = 0;
            updateCount();
            updateStats();
            document.getElementById('result').innerHTML = "投球準備完了！";
        }

        // 初期化
        function init() {
            updatePitchButtons();
            resetGame();
            // 初回描画
            setInterval(() => {
                if (!isThrowing) {
                    drawBackground();
                    drawPitcher();
                }
            }, 100);
            
            // 最初の投球案内
            setTimeout(() => {
                document.getElementById('result').innerHTML = "クリックor球種ボタンで投球！";
            }, 500);
        }

        init();
    </script>
</body>
</html>
