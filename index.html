<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Duel: Advanced</title>
    <style>
        :root { --primary: #4a90e2; --danger: #e74c3c; --success: #27ae60; --bg: #f0f4f8; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 800px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; min-height: 90vh; }
        .hidden { display: none !important; }
        button { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        /* ロビー */
        .lobby-ui { padding: 20px; }
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
        .room-card { background: #fff; border: 2px solid #eee; padding: 15px; border-radius: 12px; position: relative; }
        .room-card.playing { background: #f9f9f9; border-color: #ddd; }
        .del-btn { position: absolute; top: 5px; right: 5px; color: #ccc; font-size: 0.8rem; background: none; }

        /* ゲーム画面 */
        #view-game { padding: 15px; text-align: center; }
        .field-area { height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #eef2f7; border-radius: 15px; margin: 15px 0; border: 2px dashed #cbd5e0; }
        .field-cards { display: flex; gap: 8px; }
        .hand { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 20px; }
        
        /* カードデザイン */
        .card { width: 45px; height: 65px; background: white; border: 2px solid #2d3436; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; cursor: pointer; user-select: none; transition: 0.2s; }
        .card.selected { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-15px); }
        .card.disabled { opacity: 0.3; pointer-events: none; }
        .card.on-field { width: 50px; height: 75px; border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .game-controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .status-msg { margin: 10px 0; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div id="app">
    <!-- 1. ロビー -->
    <div id="view-lobby" class="lobby-ui">
        <h2>Card Duel ロビー</h2>
        <div style="display:flex; gap:10px; margin-bottom: 20px;">
            <input type="text" id="user-name" placeholder="プレイヤー名">
            <input type="text" id="room-name" placeholder="新しいルーム名">
            <button class="btn-primary" style="background: var(--primary); color:white;" onclick="createRoom('manual')">作成</button>
            <button id="random-btn" style="background: var(--success); color:white;" onclick="toggleRandomMatch()">おまかせ参加</button>
        </div>
        <div id="room-list" class="room-grid"></div>
    </div>

    <!-- 2. 待機室 -->
    <div id="view-waiting" class="hidden" style="padding: 40px; text-align: center;">
        <h2 id="wait-room-name">ルーム名</h2>
        <p id="wait-status">相手の参加を待っています...</p>
        <div id="player-info" style="margin: 20px 0; font-size: 1.2rem;"></div>
        <button id="start-btn" class="hidden" style="background: var(--success); color:white;" onclick="startGame()">対戦開始！</button>
        <button style="margin-top:20px; background:#ccc;" onclick="location.reload()">ロビーに戻る</button>
    </div>

    <!-- 3. ゲーム -->
    <div id="view-game" class="hidden">
        <div style="display:flex; justify-content: space-between; font-size: 0.9rem;">
            <div id="player-names">P1 vs P2</div>
            <div>相手の手札: <span id="opp-count">0</span></div>
        </div>
        
        <div class="field-area">
            <div id="field-type" style="font-size: 0.8rem; color: #7f8c8d; margin-bottom: 5px;">場: なし</div>
            <div id="field-cards" class="field-cards"></div>
        </div>

        <div id="status-msg" class="status-msg">自分の番です</div>
        <div id="my-hand" class="hand"></div>

        <div class="game-controls">
            <button id="play-btn" style="background: var(--primary); color:white;" onclick="handlePlay()">選択したカードを出す</button>
            <button style="background: #95a5a6; color:white;" onclick="handlePass()">パス (リセット)</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, push, get, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
        authDomain: "soulkin-aa3b7.firebaseapp.com",
        databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
        projectId: "soulkin-aa3b7",
        storageBucket: "soulkin-aa3b7.firebasestorage.app",
        messagingSenderId: "358331064206",
        appId: "1:358331064206:web:d7760ea0919259418a4edf",
        measurementId: "G-S5Z8TTWYE2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myRole = null;
    let currentRoomId = null;
    let myName = "";
    let selectedIndices = [];
    let isMatching = false;

    // --- ユーティリティ ---
    const show = (id) => {
        ['view-lobby', 'view-waiting', 'view-game'].forEach(v => document.getElementById(v).classList.toggle('hidden', v !== id));
    };

    // --- ロビー & マッチング ---
    onValue(ref(db, 'rooms'), (snap) => {
        const rooms = snap.val() || {};
        const listEl = document.getElementById('room-list');
        listEl.innerHTML = '';
        Object.keys(rooms).forEach(id => {
            const r = rooms[id];
            if (r.type === 'random' && r.state === 'waiting' && isMatching) return; // マッチング用は隠す

            const el = document.createElement('div');
            el.className = `room-card ${r.state === 'playing' ? 'playing' : ''}`;
            el.innerHTML = `
                <button class="del-btn" onclick="deleteRoom('${id}')">✖ 削除</button>
                <strong>${r.roomName}</strong><br>
                <small>${r.p1.name} ${r.p2 ? 'vs '+r.p2.name : '(待機中)'}</small><br>
                <button style="margin-top:10px; width:100%;" ${r.p2 || r.state==='playing' ? 'disabled':''} onclick="joinRoom('${id}')">入室</button>
            `;
            listEl.appendChild(el);
        });
    });

    window.deleteRoom = (id) => { if(confirm('ルームを削除しますか？')) remove(ref(db, `rooms/${id}`)); };

    window.createRoom = async (type = 'manual') => {
        myName = document.getElementById('user-name').value || "プレイヤー";
        const roomName = document.getElementById('room-name').value || myName + "の部屋";
        const newRef = push(ref(db, 'rooms'));
        currentRoomId = newRef.key;
        myRole = 'p1';
        await set(newRef, { roomName, type, state: 'waiting', p1: { name: myName } });
        show('view-waiting');
        listenRoom();
    };

    window.joinRoom = async (id) => {
        myName = document.getElementById('user-name').value || "ゲスト";
        currentRoomId = id;
        myRole = 'p2';
        await update(ref(db, `rooms/${id}`), { p2: { name: myName }, state: 'ready' });
        show('view-waiting');
        listenRoom();
    };

    window.toggleRandomMatch = async () => {
        isMatching = !isMatching;
        const btn = document.getElementById('random-btn');
        if (!isMatching) { btn.innerText = "おまかせ参加"; return; }
        
        btn.innerText = "マッチング中...";
        const snap = await get(ref(db, 'rooms'));
        const rooms = snap.val() || {};
        const targetId = Object.keys(rooms).find(id => rooms[id].type === 'random' && rooms[id].state === 'waiting' && !rooms[id].p2);
        
        if (targetId) joinRoom(targetId);
        else createRoom('random');
    };

    // --- ゲームロジック ---
    function listenRoom() {
        onValue(ref(db, `rooms/${currentRoomId}`), (snap) => {
            const room = snap.val();
            if (!room) { alert("ルームが消去されました"); location.reload(); return; }

            if (room.state === 'ready' || room.state === 'waiting') {
                document.getElementById('wait-room-name').innerText = room.roomName;
                document.getElementById('player-info').innerText = `${room.p1.name} vs ${room.p2 ? room.p2.name : '???'}`;
                if (myRole === 'p1' && room.p2) document.getElementById('start-btn').classList.remove('hidden');
                if (room.type === 'random' && room.p2 && myRole === 'p1') startGame(); // ランダムなら即開始
            }

            if (room.state === 'playing') {
                show('view-game');
                renderGame(room);
            }
        });
    }

    window.startGame = async () => {
        const deck = Array.from({length: 15}, (_, i) => [i+1, i+1]).flat().sort(() => Math.random() - 0.5);
        await update(ref(db, `rooms/${currentRoomId}`), {
            state: 'playing',
            p1: { ... (await get(ref(db, `rooms/${currentRoomId}/p1`))).val(), hand: deck.slice(0, 13), count: 13 },
            p2: { ... (await get(ref(db, `rooms/${currentRoomId}/p2`))).val(), hand: deck.slice(13, 26), count: 13 },
            lastAction: { type: 'none', value: 0, count: 0 },
            turn: Math.random() > 0.5 ? 'p1' : 'p2'
        });
    };

    function renderGame(room) {
        const isMyTurn = room.turn === myRole;
        const opp = myRole === 'p1' ? 'p2' : 'p1';
        const myData = room[myRole];

        document.getElementById('player-names').innerText = `${room.p1.name} vs ${room.p2.name}`;
        document.getElementById('opp-count').innerText = room[opp].count;
        document.getElementById('status-msg').innerText = isMyTurn ? "あなたの番です" : "相手の番です...";
        document.getElementById('status-msg').style.color = isMyTurn ? "var(--success)" : "#888";

        // 場のカード表示
        const fieldEl = document.getElementById('field-cards');
        fieldEl.innerHTML = '';
        if (room.lastAction.cards) {
            room.lastAction.cards.forEach(n => {
                const c = document.createElement('div');
                c.className = 'card on-field'; c.innerText = n;
                fieldEl.appendChild(c);
            });
            document.getElementById('field-type').innerText = `場: ${room.lastAction.type} (${room.lastAction.count}枚)`;
        } else {
            document.getElementById('field-type').innerText = "場: リセットされました";
        }

        // 手札表示
        const handEl = document.getElementById('my-hand');
        handEl.innerHTML = '';
        myData.hand.sort((a,b)=>a-b).forEach((num, idx) => {
            const c = document.createElement('div');
            c.className = `card ${selectedIndices.includes(idx) ? 'selected' : ''} ${!isMyTurn ? 'disabled' : ''}`;
            c.innerText = num;
            c.onclick = () => {
                if (!isMyTurn) return;
                if (selectedIndices.includes(idx)) selectedIndices = selectedIndices.filter(i => i !== idx);
                else selectedIndices.push(idx);
                renderGame(room);
            };
            handEl.appendChild(c);
        });

        if (myData.count === 0) { alert("あなたの勝利！"); remove(ref(db, `rooms/${currentRoomId}`)); location.reload(); }
        else if (room[opp].count === 0) { alert("相手の勝利..."); location.reload(); }
    }

    // --- 判定ロジック ---
    function getAction(cards) {
        cards.sort((a,b)=>a-b);
        if (cards.length === 1) return { type: 'single', value: cards[0], count: 1, cards };
        if (cards.length === 2 && cards[0] === cards[1]) return { type: 'pair', value: cards[0], count: 2, cards };
        if (cards.length >= 3) {
            const isSeq = cards.every((n, i) => i === 0 || n === cards[i-1] + 1);
            if (isSeq) return { type: 'sequence', value: cards[cards.length-1], count: cards.length, cards };
        }
        return null;
    }

    window.handlePlay = async () => {
        const snap = await get(ref(db, `rooms/${currentRoomId}`));
        const room = snap.val();
        const myHand = room[myRole].hand;
        const selectedCards = selectedIndices.map(i => myHand[i]);
        const action = getAction(selectedCards);

        if (!action) return alert("無効な組み合わせです（単発、ペア、3枚以上の連番のみ）");

        // 場との比較
        const last = room.lastAction;
        if (last.type !== 'none') {
            if (action.type !== last.type || action.count !== last.count) {
                return alert(`場と同じタイプ (${last.type} ${last.count}枚) を出してください`);
            }
            if (action.value <= last.value) return alert("場より大きい数字を出してください");
        }

        const newHand = myHand.filter((_, i) => !selectedIndices.includes(i));
        selectedIndices = [];
        await update(ref(db, `rooms/${currentRoomId}`), {
            lastAction: action,
            turn: myRole === 'p1' ? 'p2' : 'p1',
            [`${myRole}/hand`]: newHand,
            [`${myRole}/count`]: newHand.length
        });
    };

    window.handlePass = async () => {
        selectedIndices = [];
        await update(ref(db, `rooms/${currentRoomId}`), {
            lastAction: { type: 'none', value: 0, count: 0 },
            turn: myRole === 'p1' ? 'p2' : 'p1'
        });
    };
</script>
</body>
</html>
