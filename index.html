<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数字出し対戦</title>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database-compat.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f1626, #1a2339);
      color: #eee;
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; margin-bottom: 10px; color: #00d4ff; }
    .card {
      display: inline-block;
      width: 70px;
      height: 95px;
      background: linear-gradient(#fff, #f0f0f0);
      color: #111;
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      line-height: 95px;
      margin: 6px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .card:hover { transform: scale(1.1); }
    button {
      padding: 12px 24px;
      margin: 8px 4px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #00b4d8;
      color: white;
    }
    button.red { background: #e74c3c; }
    .panel {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 12px;
      margin: 15px 0;
    }
    .log {
      height: 180px;
      overflow-y: auto;
      background: #0d1421;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    input { padding: 12px; width: 220px; border-radius: 8px; border: none; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>数字出し対戦</h1>

    <!-- 名前入力 -->
    <div id="nameScreen" class="panel">
      <h2>表示名を入力</h2>
      <input type="text" id="playerName" placeholder="名前（最大12文字）" maxlength="12">
      <button onclick="startWithName()">決定して開始</button>
    </div>

    <!-- メイン画面 -->
    <div id="mainScreen" style="display:none;">
      <div class="panel">
        <strong>プレイヤー:</strong> <span id="displayName"></span>
      </div>

      <div class="panel">
        <button onclick="createRoom()">部屋を作成する</button>
        <button onclick="startRandomMatch()">ランダムマッチ</button>
        
        <div style="margin-top:15px;">
          <input type="text" id="joinRoomId" placeholder="部屋IDを入力">
          <button onclick="joinRoomById()">部屋に入る</button>
        </div>
      </div>

      <!-- ゲーム画面 -->
      <div id="gameScreen" class="panel" style="display:none;">
        <h2>対戦相手: <span id="opponentName"></span></h2>
        <p style="font-size:18px;">場に出ている数字: <span id="lastCard" style="font-size:42px; font-weight:bold; color:#ffd700;">0</span></p>
        <p><strong id="currentTurn" style="color:#00ff88;">あなたのターン</strong></p>

        <div id="myHand" style="min-height:120px;"></div>

        <button onclick="passTurn()" class="red">パスする</button>

        <div class="log" id="gameLog"></div>
      </div>
    </div>
  </div>

  <script>
    // ====================== Firebase ======================
    const firebaseConfig = {
      apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
      authDomain: "soulkin-aa3b7.firebaseapp.com",
      databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
      projectId: "soulkin-aa3b7",
      storageBucket: "soulkin-aa3b7.firebasestorage.app",
      messagingSenderId: "358331064206",
      appId: "1:358331064206:web:d7760ea0919259418a4edf"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    let currentRoomId = null;
    let myPlayerKey = null;   // "player1" or "player2"
    let playerName = "";

    // ====================== 開始 ======================
    async function startWithName() {
      playerName = document.getElementById("playerName").value.trim();
      if (!playerName) {
        alert("表示名を入力してください");
        return;
      }

      try {
        const userCredential = await auth.signInAnonymously();
        currentUser = userCredential.user;

        // 簡易ユーザー情報保存
        await db.ref('users/' + currentUser.uid).update({
          displayName: playerName,
          lastLogin: Date.now()
        });

        document.getElementById("nameScreen").style.display = "none";
        document.getElementById("mainScreen").style.display = "block";
        document.getElementById("displayName").textContent = playerName;
      } catch (e) {
        console.error(e);
        alert("エラーが発生しました");
      }
    }

    // ====================== 部屋作成 ======================
    async function createRoom() {
      currentRoomId = "room_" + Date.now().toString(36);
      myPlayerKey = "player1";

      const { p1Hand, p2Hand } = dealCards();

      const roomData = {
        status: "waiting",
        createdAt: Date.now(),
        lastCard: 0,
        currentTurn: "player1",
        players: {
          player1: { uid: currentUser.uid, displayName: playerName, hand: p1Hand }
        }
      };

      await db.ref('rooms/' + currentRoomId).set(roomData);
      enterRoom(currentRoomId);
    }

    // ====================== ランダムマッチ（改善版） ======================
    async function startRandomMatch() {
      const queueRef = db.ref('matchQueue');
      const myQueueRef = queueRef.child(currentUser.uid);

      // 既存の待機者を探す
      const snapshot = await queueRef.limitToFirst(10).once('value');
      let matchedRoomId = null;

      snapshot.forEach(child => {
        if (child.key !== currentUser.uid) {
          matchedRoomId = child.val().roomId;
          queueRef.child(child.key).remove();
          return true;
        }
      });

      if (matchedRoomId) {
        // マッチ成立（player2として参加）
        myPlayerKey = "player2";
        currentRoomId = matchedRoomId;
        enterRoomAsPlayer2(matchedRoomId);
      } else {
        // 待機キューに入る
        const newRoomId = "room_" + Date.now().toString(36);
        await myQueueRef.set({
          uid: currentUser.uid,
          displayName: playerName,
          roomId: newRoomId,
          timestamp: Date.now()
        });
        currentRoomId = newRoomId;
        myPlayerKey = "player1";
        enterRoom(newRoomId);
        addLog("対戦相手を探しています...");
      }
    }

    async function enterRoomAsPlayer2(roomId) {
      const roomRef = db.ref('rooms/' + roomId);
      const snap = await roomRef.once('value');
      const room = snap.val();

      if (room && room.players && !room.players.player2) {
        const { p1Hand, p2Hand } = dealCards();
        
        await roomRef.update({
          status: "playing",
          [`players/player2`]: {
            uid: currentUser.uid,
            displayName: playerName,
            hand: p2Hand
          }
        });
        enterRoom(roomId);
      }
    }

    // ====================== 部屋IDで参加 ======================
    async function joinRoomById() {
      const roomId = document.getElementById("joinRoomId").value.trim();
      if (!roomId) return alert("部屋IDを入力してください");
      enterRoom(roomId);
    }

    // ====================== 部屋に入る ======================
    function enterRoom(roomId) {
      currentRoomId = roomId;
      const roomRef = db.ref('rooms/' + roomId);

      roomRef.on('value', (snapshot) => {
        const room = snapshot.val();
        if (!room) return;

        if (room.status === "playing" && document.getElementById("gameScreen").style.display !== "block") {
          startGame(room);
        }
        if (room.winner) {
          endGame(room.winner === myPlayerKey);
        }
      });
    }

    function dealCards() {
      let deck = [];
      for (let i = 1; i <= 15; i++) deck.push(i, i);
      deck.sort(() => Math.random() - 0.5);
      return {
        p1Hand: deck.slice(0, 13).sort((a,b)=>a-b),
        p2Hand: deck.slice(13, 26).sort((a,b)=>a-b)
      };
    }

    function startGame(room) {
      document.getElementById("gameScreen").style.display = "block";
      
      const opponent = myPlayerKey === "player1" ? room.players.player2 : room.players.player1;
      document.getElementById("opponentName").textContent = opponent.displayName || "相手";

      renderMyHand(room);
      updateGameUI(room);
    }

    function renderMyHand(room) {
      const handDiv = document.getElementById("myHand");
      handDiv.innerHTML = "";
      const hand = room.players[myPlayerKey]?.hand || [];
      
      hand.forEach(card => {
        const el = document.createElement("div");
        el.className = "card";
        el.textContent = card;
        el.onclick = () => playCard(card);
        handDiv.appendChild(el);
      });
    }

    function updateGameUI(room) {
      document.getElementById("lastCard").textContent = room.lastCard || 0;
      const isMyTurn = room.currentTurn === myPlayerKey;
      document.getElementById("currentTurn").textContent = isMyTurn ? "あなたのターンです" : "相手のターン";
      document.getElementById("currentTurn").style.color = isMyTurn ? "#00ff88" : "#ffcc00";
    }

    async function playCard(card) {
      const roomRef = db.ref('rooms/' + currentRoomId);
      const snap = await roomRef.once('value');
      const room = snap.val();

      if (!room || room.currentTurn !== myPlayerKey) return alert("自分のターンではありません");
      if (card <= (room.lastCard || 0)) return alert("場より大きい数字を出す必要があります");

      const hand = room.players[myPlayerKey].hand.filter(c => c !== card);

      await roomRef.update({
        [`players/${myPlayerKey}/hand`]: hand,
        lastCard: card,
        currentTurn: myPlayerKey === "player1" ? "player2" : "player1"
      });

      if (hand.length === 0) {
        await roomRef.update({ winner: myPlayerKey, status: "finished" });
      }
    }

    async function passTurn() {
      if (!currentRoomId) return;
      const roomRef = db.ref('rooms/' + currentRoomId);
      await roomRef.update({
        lastCard: 0,
        currentTurn: myPlayerKey === "player1" ? "player2" : "player1"
      });
    }

    function endGame(isWin) {
      alert(isWin ? "おめでとうございます！勝利しました！" : "残念... 負けてしまいました");
      setTimeout(() => location.reload(), 1500);
    }

    function addLog(message) {
      const log = document.getElementById("gameLog");
      const time = new Date().toLocaleTimeString("ja-JP", {hour:"2-digit", minute:"2-digit"});
      log.innerHTML += `<div>[${time}] ${message}</div>`;
      log.scrollTop = log.scrollHeight;
    }

    // 認証監視
    auth.onAuthStateChanged(user => { if (user) currentUser = user; });
  </script>
</body>
</html>
