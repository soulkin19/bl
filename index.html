<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AChex 野球ルーム戦デモ</title>
<style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #111; color: #0f0; }
    .tab { display: none; }
    .active { display: block; }
    button, input { padding: 8px 12px; margin: 5px; }
    .room-list { max-height: 400px; overflow-y: auto; background: #222; padding: 10px; }
    .room-item { background: #333; margin: 5px 0; padding: 10px; border-radius: 5px; }
</style>
</head>
<body>
<h1>⚾ AChex 野球ルーム戦</h1>

<!-- 設定画面（ルームに入る前） -->
<div id="setup-screen">
    <h2>自分の投球設定（ルーム参加前に決定）</h2>
    
    <label>変化量（0〜100）: 
        <input type="range" id="breakAmount" min="0" max="100" value="50">
        <span id="breakValue">50</span>
    </label><br><br>
    
    <h3>変化球 4球種（ストレート以外）</h3>
    <div>
        <label><input type="checkbox" class="pitchType" value="スライダー" checked> スライダー</label><br>
        <label><input type="checkbox" class="pitchType" value="カーブ" checked> カーブ</label><br>
        <label><input type="checkbox" class="pitchType" value="フォーク" checked> フォーク</label><br>
        <label><input type="checkbox" class="pitchType" value="シンカー"> シンカー</label><br>
        <label><input type="checkbox" class="pitchType" value="カットボール"> カットボール</label>
    </div>

    <button onclick="saveSettingsAndShowLobby()">設定完了 → ロビーへ</button>
</div>

<!-- ロビー画面 -->
<div id="lobby-screen" class="tab">
    <h2>ロビー</h2>
    <button onclick="createRoom()">新しいルームを作成</button>
    <button onclick="refreshRoomList()">一覧更新</button>
    
    <h3>公開ルーム一覧</h3>
    <div id="roomList" class="room-list"></div>
    
    <div id="currentRoom" style="margin-top:20px; display:none;">
        <h3>現在のルーム: <span id="roomIdDisplay"></span></h3>
        <button onclick="startMatch()">試合開始（ホストのみ）</button>
        <button onclick="leaveRoom()">ルーム退出</button>
    </div>
</div>

<!-- ゲーム画面（簡易） -->
<div id="game-screen" class="tab">
    <h2>試合中</h2>
    <p>ルームID: <span id="inGameRoomId"></span></p>
    <div id="gameLog"></div>
    <button onclick="sendPitch()">投球する</button>
    <button onclick="leaveRoom()">退出</button>
</div>

<script>
// ====================== AChex 接続 ======================
const instanceName = "baseball-demo-" + Math.floor(Math.random()*10000); // 好きなインスタンス名
const wsUrl = `wss://cloud.achex.ca/${instanceName}`;

let ws;
let mySID = null;
let myUsername = "Player" + Math.floor(Math.random()*9999);
let currentRoomId = null;
let isHost = false;

let playerSettings = {};

// WebSocket接続
function connectWebSocket() {
    ws = new WebSocket(wsUrl);
    
    ws.onopen = () => {
        log("AChexに接続しました");
        // 認証（簡易）
        ws.send(JSON.stringify({ setID: myUsername, passwd: "none" }));
    };
    
    ws.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);
        
        if (msg.SID) mySID = msg.SID;
        if (msg.auth === "ok") log("認証完了: " + myUsername);
        
        handleMessage(msg);
    };
    
    ws.onerror = (e) => log("エラー: " + e);
    ws.onclose = () => log("切断されました");
}

// メッセージ処理
function handleMessage(msg) {
    if (msg.type === "new_room") {
        refreshRoomList();
    } else if (msg.type === "room_list") {
        renderRoomList(msg.rooms || []);
    } else if (msg.cmd === "pitch") {
        log(`相手が投球！ 球種: ${msg.pitchType} 変化量: ${msg.break}`);
    }
}

// ====================== 設定 ======================
function saveSettingsAndShowLobby() {
    const breakAmount = document.getElementById("breakAmount").value;
    const selectedPitches = Array.from(document.querySelectorAll('.pitchType:checked'))
                               .map(cb => cb.value);
    
    if (selectedPitches.length === 0) {
        alert("少なくとも1つ変化球を選択してください");
        return;
    }
    
    playerSettings = {
        breakAmount: parseInt(breakAmount),
        pitchTypes: selectedPitches
    };
    
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("lobby-screen").classList.add("active");
    
    connectWebSocket();
}

// ====================== ルーム機能 ======================
function createRoom() {
    currentRoomId = "room_" + Math.random().toString(36).substr(2, 8);
    isHost = true;
    
    ws.send(JSON.stringify({
        cmd: "register_broadcast",
        bid: currentRoomId
    }));
    
    // ロビーに通知
    ws.send(JSON.stringify({
        to: "lobby",
        type: "new_room",
        roomId: currentRoomId,
        host: myUsername,
        players: 1,
        maxPlayers: 2,
        settings: playerSettings
    }));
    
    showCurrentRoom();
}

function refreshRoomList() {
    // 簡易実装：実際はサーバーから取得するか、broadcastで管理
    ws.send(JSON.stringify({ to: "lobby", type: "request_list" }));
    log("ルーム一覧を更新中...");
}

function renderRoomList(rooms) {
    const div = document.getElementById("roomList");
    div.innerHTML = "";
    
    // ダミーデータ（実際は受信したもので描画）
    if (rooms.length === 0) {
        div.innerHTML = "<p>現在公開ルームはありません</p>";
    }
}

function joinRoom(roomId) {
    currentRoomId = roomId;
    isHost = false;
    
    ws.send(JSON.stringify({
        cmd: "register_broadcast",
        bid: currentRoomId
    }));
    
    showCurrentRoom();
}

function showCurrentRoom() {
    document.getElementById("roomIdDisplay").textContent = currentRoomId;
    document.getElementById("currentRoom").style.display = "block";
}

// ====================== 試合 ======================
function startMatch() {
    if (!isHost) return alert("ホストのみ開始できます");
    
    document.getElementById("lobby-screen").classList.remove("active");
    document.getElementById("game-screen").classList.add("active");
    document.getElementById("inGameRoomId").textContent = currentRoomId;
    
    log("試合を開始しました！");
}

function sendPitch() {
    if (!currentRoomId) return;
    
    const randomType = playerSettings.pitchTypes[Math.floor(Math.random() * playerSettings.pitchTypes.length)];
    
    ws.send(JSON.stringify({
        to: currentRoomId,           // ルーム内のみに送信
        cmd: "pitch",
        pitchType: randomType,
        break: playerSettings.breakAmount
    }));
    
    log(`あなたは ${randomType} を投げました！ (変化量: ${playerSettings.breakAmount})`);
}

function leaveRoom() {
    currentRoomId = null;
    document.getElementById("game-screen").classList.remove("active");
    document.getElementById("lobby-screen").classList.add("active");
    document.getElementById("currentRoom").style.display = "none";
}

// ログ出力
function log(text) {
    console.log(text);
    const logDiv = document.getElementById("gameLog") || document.createElement("div");
    if (document.getElementById("gameLog")) {
        document.getElementById("gameLog").innerHTML += text + "<br>";
    }
}

// 初期化
window.onload = () => {
    document.getElementById("breakAmount").oninput = function() {
        document.getElementById("breakValue").textContent = this.value;
    };
};
</script>
</body>
</html>
