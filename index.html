<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-15 Card Duel</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        #app { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .hidden { display: none; }
        .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 20px 0; }
        .card { padding: 15px 10px; width: 40px; border: 2px solid #333; border-radius: 8px; cursor: pointer; font-weight: bold; background: white; transition: 0.2s; }
        .card:hover { background: #eee; transform: translateY(-3px); }
        .card.disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        #field { font-size: 3rem; margin: 20px 0; min-height: 80px; color: #007bff; font-weight: bold; }
        .status-bar { padding: 10px; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem; }
        button.main-btn { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin: 5px; }
        button.pass-btn { background: #6c757d; }
    </style>
</head>
<body>

<div id="app">
    <h1>1-15 Card Duel</h1>

    <!-- ロビー画面 -->
    <div id="lobby">
        <button class="main-btn" onclick="startMatch(true)">ランダムマッチ</button>
        <div style="margin: 10px;">または</div>
        <input type="text" id="roomInput" placeholder="ルームIDを入力">
        <button class="main-btn" onclick="startMatch(false)">ルーム参戦/作成</button>
    </div>

    <!-- ゲーム画面 -->
    <div id="game" class="hidden">
        <div class="status-bar">
            ID: <span id="displayRoomId">---</span> | 
            <span id="turnInfo">接続中...</span>
        </div>
        <div id="opponent-status">相手の手札: <span id="oppCount">13</span>枚</div>
        
        <div id="field">0</div>
        <p>場のカードより大きい数字を出してください</p>

        <div id="my-hand" class="card-container"></div>
        
        <button id="passBtn" class="main-btn pass-btn" onclick="handlePass()">パス（場をリセット）</button>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, push, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
        authDomain: "soulkin-aa3b7.firebaseapp.com",
        databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
        projectId: "soulkin-aa3b7",
        storageBucket: "soulkin-aa3b7.firebasestorage.app",
        messagingSenderId: "358331064206",
        appId: "1:358331064206:web:d7760ea0919259418a4edf",
        measurementId: "G-S5Z8TTWYE2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myId = null; // "p1" or "p2"
    let currentRoomId = null;
    let myHand = [];

    // --- マッチングロジック ---
    window.startMatch = async (isRandom) => {
        let roomId = document.getElementById('roomInput').value;
        const roomsRef = ref(db, 'rooms');

        if (isRandom) {
            const waitingQuery = query(roomsRef, orderByChild('state'), equalTo('waiting'));
            const snapshot = await get(waitingQuery);
            if (snapshot.exists()) {
                roomId = Object.keys(snapshot.val())[0];
            } else {
                roomId = "room_" + Math.random().toString(36).substring(7);
            }
        }

        if (!roomId) return alert("ルームIDを入力してください");
        setupRoom(roomId);
    };

    async function setupRoom(roomId) {
        currentRoomId = roomId;
        const roomRef = ref(db, `rooms/${roomId}`);
        const snapshot = await get(roomRef);

        if (!snapshot.exists()) {
            // P1として部屋作成
            myId = "p1";
            const deck = Array.from({length: 15}, (_, i) => [i+1, i+1]).flat().sort(() => Math.random() - 0.5);
            myHand = deck.slice(0, 13);
            const p2Hand = deck.slice(13, 26); // 残り4枚は deck.slice(26, 30) で未使用

            await set(roomRef, {
                state: "waiting",
                lastCard: 0,
                turn: Math.random() > 0.5 ? "p1" : "p2",
                p1: { hand: myHand, count: 13 },
                p2: { hand: p2Hand, count: 13 },
                lastAction: "start"
            });
        } else {
            // P2として参加
            myId = "p2";
            await update(roomRef, { state: "playing" });
        }

        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        document.getElementById('displayRoomId').innerText = roomId;
        listenRoom();
    }

    // --- ゲーム監視 ---
    function listenRoom() {
        const roomRef = ref(db, `rooms/${currentRoomId}`);
        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            myHand = data[myId].hand || [];
            const isMyTurn = data.turn === myId;
            const lastCard = data.lastCard;

            // UI更新
            document.getElementById('field').innerText = lastCard === 0 ? "RESET" : lastCard;
            document.getElementById('oppCount').innerText = data[myId === "p1" ? "p2" : "p1"].count;
            document.getElementById('turnInfo').innerText = isMyTurn ? "あなたの番です" : "相手の番です...";
            document.getElementById('turnInfo').style.color = isMyTurn ? "#28a745" : "#dc3545";

            renderHand(isMyTurn, lastCard);

            // 勝敗判定
            if (data.p1.count === 0) endGame(data.p1.count === 0 && myId === "p1");
            if (data.p2.count === 0) endGame(data.p2.count === 0 && myId === "p2");
        });
    }

    function renderHand(isMyTurn, lastCard) {
        const container = document.getElementById('my-hand');
        container.innerHTML = '';
        myHand.sort((a, b) => a - b).forEach((num, index) => {
            const card = document.createElement('div');
            card.className = `card ${(!isMyTurn || num <= lastCard) ? 'disabled' : ''}`;
            card.innerText = num;
            card.onclick = () => {
                if (isMyTurn && num > lastCard) handlePlay(num);
            };
            container.appendChild(card);
        });
    }

    // --- アクション ---
    async function handlePlay(num) {
        const roomRef = ref(db, `rooms/${currentRoomId}`);
        const newHand = myHand.filter((c, i) => i !== myHand.indexOf(num));
        
        await update(roomRef, {
            lastCard: num,
            turn: myId === "p1" ? "p2" : "p1",
            [`${myId}/hand`]: newHand,
            [`${myId}/count`]: newHand.length
        });
    }

    async function handlePass() {
        const roomRef = ref(db, `rooms/${currentRoomId}`);
        // パス時は場を0にリセットし、相手のターンへ
        await update(roomRef, {
            lastCard: 0,
            turn: myId === "p1" ? "p2" : "p1"
        });
    }

    function endGame(isWin) {
        alert(isWin ? "おめでとう！あなたの勝利です！" : "残念... 相手が先に上がりました。");
        location.reload();
    }
</script>

</body>
</html>
