<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>2D Online Survival PvP</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            background-color: #333;
            border: 2px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        #status {
            color: #0f0;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status">サーバー接続中...</div>
        <div id="hpDisplay">HP: 100 / 100</div>
        <div id="ammoDisplay">弾薬: 20</div>
        <div id="weaponDisplay">武器: ハンドガン</div>
    </div>

    <!-- 画面は800x800ですが、内部の論理座標は200x200で計算します -->
    <canvas id="gameCanvas" width="800" height="800"></canvas>

<script>
/**
 * ネットワーク設定 (Achex Server)
 */
const ws = new WebSocket('wss://ws.achex.ca/');
const ROOM_NAME = "surv_pvp_room_2026_xyz"; // 衝突を防ぐためのユニークなルーム名
const MY_ID = Math.random().toString(36).substring(2, 9);

let isConnected = false;

ws.onopen = () => {
    document.getElementById('status').innerText = "サーバー接続完了！";
    document.getElementById('status').style.color = "#0f0";
    isConnected = true;
    
    // Achexのハブ(ルーム)に参加
    ws.send(JSON.stringify({ "auth": ROOM_NAME }));
};

ws.onmessage = (e) => {
    try {
        const msg = JSON.parse(e.data);
        if (msg.s && msg.s !== MY_ID) {
            handleNetworkMessage(msg.s, msg.d);
        }
    } catch (err) {}
};

function sendMsg(type, data) {
    if (!isConnected) return;
    const payload = {
        to: ROOM_NAME,
        s: MY_ID,
        d: { type: type, ...data }
    };
    ws.send(JSON.stringify(payload));
}

/**
 * ゲーム設定と状態管理
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const MAP_SIZE = 200; // ステージ範囲 200x200
const SCALE = 4;      // 描画倍率 (800 / 200 = 4)

// 入力状態
const keys = { w: false, a: false, s: false, d: false };
let mouseX = 100, mouseY = 100;
let isShooting = false;

// ゲームデータ
const players = {};
const bullets = [];
const items = [];

// 自分のプレイヤー情報
let me = {
    x: Math.random() * MAP_SIZE,
    y: Math.random() * MAP_SIZE,
    radius: 3,
    hp: 100,
    maxHp: 100,
    ammo: 20,
    speed: 0.8,
    color: '#00ffff',
    weaponCooldown: 0,
    dead: false
};

/**
 * 入力イベント
 */
window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    // マウス座標を200x200の論理座標に変換
    mouseX = (e.clientX - rect.left) / SCALE;
    mouseY = (e.clientY - rect.top) / SCALE;
});
canvas.addEventListener('mousedown', () => isShooting = true);
canvas.addEventListener('mouseup', () => isShooting = false);

/**
 * ネットワークメッセージの処理
 */
function handleNetworkMessage(senderId, data) {
    if (data.type === 'update') {
        players[senderId] = data;
    } else if (data.type === 'shoot') {
        bullets.push({
            x: data.x, y: data.y, vx: data.vx, vy: data.vy,
            owner: senderId, life: 60 // 弾の寿命(フレーム)
        });
    } else if (data.type === 'hit' && data.target === MY_ID) {
        if (!me.dead) {
            me.hp -= 15;
            if (me.hp <= 0) die();
        }
    } else if (data.type === 'itemSpawn') {
        items.push(data.item);
    } else if (data.type === 'itemPickup') {
        const idx = items.findIndex(i => i.id === data.itemId);
        if (idx !== -1) items.splice(idx, 1);
    }
}

/**
 * ゲームロジック
 */
function die() {
    me.dead = true;
    me.hp = 0;
    setTimeout(() => {
        // 3秒後にリスポーン
        me.dead = false;
        me.hp = me.maxHp;
        me.ammo = 20;
        me.x = Math.random() * MAP_SIZE;
        me.y = Math.random() * MAP_SIZE;
    }, 3000);
}

// アイテムの自動生成（P2Pなので各クライアントが確率で生成し同期する）
function spawnItemLogic() {
    if (Math.random() < 0.01 && items.length < 15) {
        const types = ['heal', 'ammo', 'weapon_upgrade'];
        const type = types[Math.floor(Math.random() * types.length)];
        const newItem = {
            id: Math.random().toString(36).substring(2),
            x: Math.random() * MAP_SIZE,
            y: Math.random() * MAP_SIZE,
            type: type
        };
        items.push(newItem);
        sendMsg('itemSpawn', { item: newItem });
    }
}

function update() {
    if (!me.dead) {
        // 移動処理
        let dx = 0, dy = 0;
        if (keys.w) dy -= me.speed;
        if (keys.s) dy += me.speed;
        if (keys.a) dx -= me.speed;
        if (keys.d) dx += me.speed;

        // 斜め移動の正規化
        if (dx !== 0 && dy !== 0) {
            const length = Math.sqrt(dx * dx + dy * dy);
            dx = (dx / length) * me.speed;
            dy = (dy / length) * me.speed;
        }

        me.x += dx;
        me.y += dy;

        // 200x200の範囲制限
        me.x = Math.max(me.radius, Math.min(MAP_SIZE - me.radius, me.x));
        me.y = Math.max(me.radius, Math.min(MAP_SIZE - me.radius, me.y));

        // 射撃処理
        if (me.weaponCooldown > 0) me.weaponCooldown--;
        if (isShooting && me.weaponCooldown <= 0 && me.ammo > 0) {
            const angle = Math.atan2(mouseY - me.y, mouseX - me.x);
            const speed = 3;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            
            me.ammo--;
            me.weaponCooldown = 15; // 連射速度

            sendMsg('shoot', { x: me.x, y: me.y, vx: vx, vy: vy });
        }

        // アイテム取得判定
        for (let i = items.length - 1; i >= 0; i--) {
            const item = items[i];
            const dist = Math.sqrt((me.x - item.x)**2 + (me.y - item.y)**2);
            if (dist < me.radius + 3) {
                if (item.type === 'heal') me.hp = Math.min(me.maxHp, me.hp + 40);
                if (item.type === 'ammo') me.ammo += 30;
                if (item.type === 'weapon_upgrade') { me.speed = 1.2; me.maxHp = 150; me.hp += 50; }
                
                sendMsg('itemPickup', { itemId: item.id });
                items.splice(i, 1);
            }
        }
    }

    // 弾の移動と衝突判定
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        b.life--;

        // 弾が自分に当たったか判定（他人の弾のみ）
        if (b.owner !== MY_ID && !me.dead) {
            const dist = Math.sqrt((me.x - b.x)**2 + (me.y - b.y)**2);
            if (dist < me.radius + 1) {
                sendMsg('hit', { target: MY_ID });
                me.hp -= 15;
                if (me.hp <= 0) die();
                bullets.splice(i, 1);
                continue;
            }
        }

        if (b.life <= 0 || b.x < 0 || b.x > MAP_SIZE || b.y < 0 || b.y > MAP_SIZE) {
            bullets.splice(i, 1);
        }
    }

    spawnItemLogic();

    // 状態をサーバーに送信（ネットワーク負荷軽減のため少し間引くのが理想ですが、今回はシンプルに毎フレーム送信）
    if (Math.random() < 0.5) { 
        sendMsg('update', { x: me.x, y: me.y, hp: me.hp, dead: me.dead, color: me.color });
    }

    // UI更新
    document.getElementById('hpDisplay').innerText = `HP: ${me.hp} / ${me.maxHp}`;
    document.getElementById('ammoDisplay').innerText = `弾薬: ${me.ammo}`;
    if(me.dead) document.getElementById('hpDisplay').innerText = "死亡... リスポーン待機中";
}

/**
 * 描画処理
 */
function draw() {
    // 描画をSCALE倍に拡大
    ctx.save();
    ctx.scale(SCALE, SCALE);

    // 背景クリア
    ctx.fillStyle = '#333';
    ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

    // グリッド線 (200x200の範囲をわかりやすくする)
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 0.2;
    for (let i = 0; i <= MAP_SIZE; i += 10) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
    }

    // アイテムの描画
    items.forEach(item => {
        ctx.beginPath();
        ctx.arc(item.x, item.y, 2, 0, Math.PI * 2);
        if (item.type === 'heal') ctx.fillStyle = '#0f0'; // 緑: 回復
        else if (item.type === 'ammo') ctx.fillStyle = '#ff0'; // 黄: 弾薬
        else ctx.fillStyle = '#f0f'; // 紫: 武器アップグレード
        ctx.fill();
    });

    // 他のプレイヤーの描画
    for (let id in players) {
        let p = players[id];
        if (p.dead) continue;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#ff4444'; // 敵は赤
        ctx.fill();
        
        // HPバー
        ctx.fillStyle = '#f00';
        ctx.fillRect(p.x - 3, p.y - 5, 6, 1);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(p.x - 3, p.y - 5, 6 * (p.hp / 100), 1);
    }

    // 自分の描画
    if (!me.dead) {
        ctx.beginPath();
        ctx.arc(me.x, me.y, me.radius, 0, Math.PI * 2);
        ctx.fillStyle = me.color;
        ctx.fill();

        // 照準線
        ctx.beginPath();
        ctx.moveTo(me.x, me.y);
        ctx.lineTo(mouseX, mouseY);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    // 弾の描画
    ctx.fillStyle = '#fff';
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 1, 0, Math.PI * 2);
        ctx.fill();
    });

    ctx.restore();
}

/**
 * メインループ
 */
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
